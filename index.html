<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Voice Journal</title>

<style>

body{
font-family: Arial, sans-serif;
max-width:700px;
margin:40px auto;
background:#f4f4f4;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:150px;
margin-top:15px;
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.controls{
text-align:center;
}

.entry{
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>Voice Journal</h1>

<div class="controls">
<button onclick="startRecording()">Start Recording</button>
<button onclick="stopRecording()">Stop</button>
<button onclick="saveEntry()">Save Entry</button>
</div>

<textarea id="journalText" placeholder="Your words will appear here..."></textarea>

<h2>Past Entries</h2>

<div id="entries"></div>

<script>

let recognition;

if ('webkitSpeechRecognition' in window) {
recognition = new webkitSpeechRecognition();
} 
else if ('SpeechRecognition' in window) {
recognition = new SpeechRecognition();
} 
else {
alert("Speech recognition not supported in this browser.");
}

recognition.continuous = true;

recognition.onresult = function(event){

let transcript = event.results[event.results.length - 1][0].transcript;

let box = document.getElementById("journalText");

box.value += transcript + " ";

};

function startRecording(){

recognition.start();

}

function stopRecording(){

recognition.stop();

}

function saveEntry(){

let text = document.getElementById("journalText").value;

if(text.trim() === "") return;

let date = new Date().toLocaleString();

let entryHTML = `
<div class="entry">
<strong>${date}</strong>
<p>${text}</p>
</div>
`;

document.getElementById("entries").innerHTML += entryHTML;

saveToLocal(text,date);

document.getElementById("journalText").value = "";

}

function saveToLocal(text,date){

let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];

entries.push({
text:text,
date:date
});

localStorage.setItem("journalEntries",JSON.stringify(entries));

}

function loadEntries(){

let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];

let container = document.getElementById("entries");

entries.forEach(entry=>{

let entryHTML = `
<div class="entry">
<strong>${entry.date}</strong>
<p>${entry.text}</p>
</div>
`;

container.innerHTML += entryHTML;

});

}

loadEntries();

</script>

</body>
</html>
